<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">Student Manager</span>

        <div class="text-white">
            Logged in as {{ session['user'] }}
            <a href="/logout" class="btn btn-sm btn-danger ms-3">Logout</a>
        </div>
    </nav>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Edit Student</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="name" class="form-control" value="{{ student.name }}">
            </div>
            <div class="mb-3">
                <input type="number" name="age" class="form-control" value="{{ student.age }}">
            </div>
            <button type="submit" class="btn btn-primary w-100">Update</button>
        </form>

    </div>
</div>

</body>
</html>
