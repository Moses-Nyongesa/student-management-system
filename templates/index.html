<head>
    <title>Student Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        
        <h2 class="text-center mb-4">Student Manager</h2>

        <form action="/add" method="POST" class="row g-2 mb-4">
            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="Enter name" required>
            </div>
            <div class="col-md-5">
                <input type="number" name="age" class="form-control" placeholder="Enter age" required>
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-success">Add</button>
            </div>
        </form>

        <ul class="list-group">
            {% for student in students %}
           <li class="list-group-item d-flex justify-content-between align-items-center">
    
    <span>{{ student.name }} ({{ student.age }})</span>

    <div class="d-flex gap-2">
        <a href="/edit/{{ student.id }}" class="btn btn-sm btn-warning">Edit</a>
        <a href="/delete/{{ student.id }}" 
            class="btn btn-sm btn-danger"
            onclick="return confirm('Are you sure you want to delete this student?')">
             Delete
        </a>
    </div>

</li>
            {% endfor %}
        </ul>

    </div>
</div>

</body>


        </form>

    </div>
</div>

</body>
</html>
